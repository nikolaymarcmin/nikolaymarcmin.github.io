  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <button class="lightbox-prev" onclick="event.stopPropagation(); changePhoto(-1)">‹</button>
    <img class="lightbox-img" id="lightboxImg" src="" alt="" onclick="event.stopPropagation()">
    <button class="lightbox-next" onclick="event.stopPropagation(); changePhoto(1)">›</button>

<script>
  const photos = [
    'images/nature/01.jpg',
    'images/nature/02.jpg',
    'images/nature/03.jpg',
    'images/nature/04.jpg',
    'images/nature/05.jpg',
    'images/nature/06.jpg',
    'images/nature/07.jpg',
    'images/nature/08.jpg',
    'images/nature/09.jpg',
    'images/nature/10.jpg',
    'images/nature/11.jpg',
    'images/nature/12.jpg',
    'images/nature/13.jpg',
    'images/nature/14.jpg',
    'images/nature/15.jpg',
    'images/nature/16.jpg',
    'images/nature/17.jpg',
    'images/nature/18.jpg',
    'images/nature/19.jpg',
    'images/nature/20.jpg',
    'images/nature/21.jpg',
  ];

  let current = 0;

  function openPhoto(index) {
    current = index;
    document.getElementById('lightboxImg').src = photos[current];
    document.getElementById('lightbox').style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lightbox').style.display = 'none';
    document.body.style.overflow = '';
  }

  function changePhoto(direction) {
    current = (current + direction + photos.length) % photos.length;
    document.getElementById('lightboxImg').src = photos[current];
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowRight') changePhoto(1);
    if (e.key === 'ArrowLeft') changePhoto(-1);
    if (e.key === 'Escape') closeLightbox();
  });
</script>
